<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Tactics Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* CSSは元のコードと同じため省略（そのまま使えます） */
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #1b3d17; font-family: sans-serif; }
        canvas { display: none; width: 100vw; height: 100vh; background: #1b3d17; }
        #setup-screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: #fdfdfd; z-index: 50; }
        .setup-container { display: flex; flex: 1; overflow: hidden; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .p1-setup { background: #f1f7ff; }
        .unit-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; max-width: 180px; }
        .unit-card { height: 60px; border: 2px solid #ddd; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; cursor: pointer; font-size: 11px; }
        .selected { border-color: #ff9f43 !important; background: #fffbf0; }
        .cost { position: absolute; top: -5px; right: -5px; background: #f1c40f; padding: 1px 4px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .footer-area { height: 80px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #ddd; }
        #start-btn { padding: 12px 50px; font-size: 18px; background: #ccc; border-radius: 25px; border: none; pointer-events: none; }
        #start-btn.ready { background: orange; color: white; cursor: pointer; pointer-events: auto; }
        #ui { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 30; }
        .side-bar { position: absolute; top: 0; bottom: 0; width: 90px; display: flex; align-items: center; pointer-events: auto; }
        .p2-bar { left: 5px; } .p1-bar { right: 5px; flex-direction: row-reverse; }
        .slots { display: flex; flex-direction: column; gap: 8px; }
        .slot { width: 65px; height: 55px; background: rgba(255,255,255,0.9); border: 2px solid #ccc; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot.active { border-color: #333; transform: scale(1.1); }
        .mp-bar { width: 12px; height: 280px; background: rgba(0,0,0,0.5); border-radius: 6px; position: relative; margin: 0 10px; overflow: hidden; }
        .mp-fill { position: absolute; bottom: 0; width: 100%; }
        #base-hp { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; gap: 30px; }
        .hp-box { width: 35%; height: 12px; background: rgba(0,0,0,0.6); border-radius: 6px; overflow: hidden; }
        #result-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div style="text-align: center; padding: 10px; background: #222; color: white;">ONLINE MODE: <span id="player-status">接続中...</span></div>
    <div class="setup-container">
        <div class="player-side p1-setup">
            <h3>MY TEAM DECK</h3>
            <div class="unit-grid" id="grid1"></div>
        </div>
    </div>
    <div class="footer-area"><button id="start-btn" onclick="startGame()">バトル開始 🔥</button></div>
</div>

<div id="ui">
    <div id="base-hp">
        <div class="hp-box"><div id="hp2-fill" style="width:100%; height:100%; background:#ff4757;"></div></div>
        <div class="hp-box"><div id="hp1-fill" style="width:100%; height:100%; background:#2e86de;"></div></div>
    </div>
    <div class="side-bar p1-bar"><div class="slots" id="slots1"></div><div class="mp-bar"><div id="mp1-fill" class="mp-fill" style="background:#2e86de;"></div></div></div>
</div>

<div id="result-screen"><h1 id="result-title"></h1><button onclick="location.reload()">もう一度遊ぶ</button></div>
<canvas id="gameCanvas"></canvas>

<script>
const socket = io();
const EMOJI = { "速":"🏃", "重":"🐘", "乱":"🐝", "砲":"💣", "突":"🏎️", "盾":"🛡️", "爆":"🧨", "氷":"❄️", "雷":"⚡", "影":"👻", "obs":"🪨" };
const ALL_UNITS = [
    { name: "速", speed: 1.3, radius: 12, hp: 80, atk: 12, interval: 40, cost: 15, range: 0.35 },
    { name: "重", speed: 0.35, radius: 25, hp: 450, atk: 45, interval: 80, cost: 70, range: 0.25 },
    { name: "乱", speed: 1.0, radius: 10, hp: 45, atk: 8, interval: 45, cost: 12, range: 0.4, jitter: true },
    { name: "砲", speed: 0.1, radius: 20, hp: 160, atk: 85, interval: 170, cost: 85, range: 0.15, isCannon: true },
    { name: "突", speed: 2.6, radius: 12, hp: 60, atk: 25, interval: 35, cost: 35, range: 0.5 },
    { name: "盾", speed: 0.25, radius: 28, hp: 1000, atk: 5, interval: 100, cost: 75, range: 0.2 },
    { name: "爆", speed: 1.9, radius: 13, hp: 35, atk: 500, interval: 1, cost: 55, range: 0.45, isBomb: true },
    { name: "氷", speed: 0.7, radius: 16, hp: 130, atk: 7, interval: 70, cost: 40, range: 0.35 },
    { name: "雷", speed: 0.6, radius: 15, hp: 110, atk: 70, interval: 110, cost: 65, range: 0.25, isCannon: true },
    { name: "影", speed: 1.1, radius: 12, hp: 70, atk: 12, interval: 45, cost: 30, range: 0.4 }
];

let myPlayerId = 1; 
let p1Deck = [], gameRunning = false, units = [], bullets = [], obstacles = [], effects = [], gameTime = 0;
const players = { 1: { hp: 2000, mp: 40, selected: 0, deck: [] }, 2: { hp: 2000, mp: 40 } };
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');

socket.on('assign-player', (id) => {
    myPlayerId = id;
    document.getElementById('player-status').innerText = "PLAYER " + id + (id === 1 ? " (先攻)" : " (後攻)");
});

// デッキ構築UI
const grid = document.getElementById('grid1');
ALL_UNITS.forEach((u, i) => {
    const card = document.createElement('div'); card.className = 'unit-card';
    card.innerHTML = `<span class="cost">${u.cost}</span><span style="font-size:22px">${EMOJI[u.name]}</span><b>${u.name}</b>`;
    card.onclick = () => {
        if (p1Deck.includes(i)) p1Deck.splice(p1Deck.indexOf(i),1); else if (p1Deck.length < 5) p1Deck.push(i);
        card.classList.toggle('selected', p1Deck.includes(i));
        document.getElementById('start-btn').className = p1Deck.length === 5 ? 'ready' : '';
    };
    grid.appendChild(card);
});

window.startGame = () => {
    gameRunning = true; 
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    canvas.style.display = 'block';
    players[1].deck = p1Deck.map(i => ALL_UNITS[i]);
    resize(); initBattleUI(); loop();
};

function initBattleUI() {
    const container = document.getElementById('slots1'); container.innerHTML = '';
    players[1].deck.forEach((u, i) => {
        const slot = document.createElement('div'); slot.className = `slot ${i===0?'active':''}`;
        slot.innerHTML = `<span class="cost">${u.cost}</span><span style="font-size:22px">${EMOJI[u.name]}</span>`;
        slot.onclick = () => { players[1].selected = i; Array.from(container.children).forEach((s, idx) => s.classList.toggle('active', idx === i)); };
        container.appendChild(slot);
    });
}

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    obstacles = [{x:canvas.width/2, y:canvas.height/2, r:50, hp:1000, maxHp:1000, active:true, timer:0}];
}

class Unit {
    constructor(x, y, owner, type) {
        this.x = x; this.y = y; this.owner = owner; this.type = {...type};
        this.hp = type.hp; this.maxHp = type.hp; this.active = true;
        this.vx = (owner === 1) ? -type.speed : type.speed; // 1は右から左、2は左から右
        this.vy = 0; this.cooldown = 0; this.target = null;
    }
    update() {
        if (this.target && !this.target.active) this.target = null;
        let blocked = false;
        obstacles.forEach(o => { if (o.active && Math.hypot(this.x-o.x, this.y-o.y) < this.type.radius + o.r) { blocked = true; this.target = o; } });
        if (!this.target) units.forEach(u => { if(u.owner !== this.owner && Math.hypot(u.x-this.x, u.y-this.y) < this.type.radius + u.type.radius + 10) this.target = u; });

        if (this.target) {
            if (++this.cooldown >= this.type.interval) {
                this.target.hp -= this.type.atk;
                if (this.type.isBomb) this.active = false;
                this.cooldown = 0;
            }
        } else if (!blocked) {
            this.x += this.vx;
        }
        if (this.hp <= 0) this.active = false;
        if (this.x < 0 || this.x > canvas.width) { players[this.x < 0 ? 2 : 1].hp -= 100; this.active = false; }
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.textAlign = "center"; ctx.font = `${this.type.radius*2}px serif`;
        ctx.fillText(EMOJI[this.type.name], 0, 0);
        ctx.fillStyle = "red"; ctx.fillRect(-10, -20, 20 * (this.hp/this.maxHp), 3);
        ctx.restore();
    }
}

socket.on('enemy-spawn', (data) => {
    // 相手の視点を反転させて描画
    const enemyUnit = data.unit;
    units.push(new Unit(canvas.width - data.x, data.y, 2, enemyUnit));
});

function loop() {
    if (!gameRunning) return;
    gameTime++; ctx.clearRect(0,0,canvas.width,canvas.height);
    
    players[1].mp = Math.min(100, players[1].mp + 0.15);
    document.getElementById('mp1-fill').style.height = players[1].mp + '%';
    document.getElementById('hp1-fill').style.width = (players[1].hp/2000*100) + '%';
    document.getElementById('hp2-fill').style.width = (players[2].hp/2000*100) + '%';

    units.forEach(u => { u.update(); u.draw(); });
    units = units.filter(u => u.active);
    obstacles.forEach(o => { if(o.active) { ctx.font="40px serif"; ctx.fillText(EMOJI.obs, o.x, o.y); } });

    requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', e => {
    if (!gameRunning) return;
    const pType = players[1].deck[players[1].selected];
    if (players[1].mp >= pType.cost && e.clientX > canvas.width/2) {
        units.push(new Unit(e.clientX, e.clientY, 1, pType));
        players[1].mp -= pType.cost;
        socket.emit('spawn', { x: e.clientX, y: e.clientY, unit: pType });
    }
});
</script>
</body>
</html>
