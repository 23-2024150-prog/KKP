<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Tactics Online - Lobby</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* (前回のCSSを継承しつつ追加) */
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #1b3d17; font-family: sans-serif; color: #333; }
        #setup-screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: #fdfdfd; z-index: 50; }
        .header { background: #222; color: white; padding: 15px; text-align: center; }
        .setup-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .deck-area { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .config-area { width: 150px; border-left: 1px solid #ddd; padding: 10px; display: none; }
        .unit-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; width: 100%; }
        .unit-card { height: 50px; border: 2px solid #ddd; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; background: white; position: relative; }
        .unit-card.selected { border-color: #ff9f43; background: #fffbf0; }
        .cost { position: absolute; top: -2px; right: -2px; background: gold; padding: 1px 3px; border-radius: 4px; font-size: 9px; }
        .footer-area { height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 1px solid #ddd; background: #eee; }
        #start-btn { padding: 12px 60px; font-size: 18px; background: #ccc; border-radius: 30px; border: none; font-weight: bold; }
        #start-btn.ready { background: linear-gradient(to bottom, #ff9f43, #ff6b6b); color: white; cursor: pointer; }
        canvas { display: none; width: 100vw; height: 100vh; }
        #ui { position: absolute; inset: 0; pointer-events: none; display: none; }
        /* ゲームUI（前回同様） */
        .mp-bar { position: absolute; bottom: 20px; right: 20px; width: 15px; height: 200px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; pointer-events: auto; }
        .mp-fill { position: absolute; bottom: 0; width: 100%; background: #2e86de; transition: height 0.3s; }
        .slots { position: absolute; bottom: 20px; right: 45px; display: flex; gap: 5px; pointer-events: auto; }
        .slot { width: 50px; height: 50px; background: white; border: 2px solid #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .slot.active { border-color: orange; transform: translateY(-5px); }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="header">
        <div id="role-badge" style="font-size: 12px; color: #aaa;">接続中...</div>
        <div id="room-status" style="font-weight: bold;">対戦相手を待っています... (1/2)</div>
    </div>
    
    <div class="setup-container">
        <div class="deck-area">
            <h4 style="margin:5px">デッキ編成 (5体選択)</h4>
            <div class="unit-grid" id="grid-p1"></div>
        </div>
        <div id="host-config" class="config-area">
            <h4>ゲーム設定</h4>
            <label style="font-size: 12px;">MP回復速度</label><br>
            <select id="mp-speed" onchange="updateConfig()">
                <option value="0.15">通常</option>
                <option value="0.3">早い</option>
                <option value="0.05">遅い</option>
            </select>
        </div>
    </div>

    <div class="footer-area">
        <div id="guest-msg" style="display:none; color: #666; margin-bottom: 10px;">ホストが開始するのを待っています...</div>
        <button id="start-btn" onclick="requestStart()">バトル開始 🔥</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div class="mp-bar"><div id="mp-fill" class="mp-fill"></div></div>
    <div class="slots" id="battle-slots"></div>
</div>

<script>
const socket = io();
const EMOJI = { "速":"🏃", "重":"🐘", "乱":"🐝", "砲":"💣", "突":"🏎️", "盾":"🛡️", "爆":"🧨", "氷":"❄️", "雷":"⚡", "影":"👻", "obs":"🪨" };
const ALL_UNITS = [
    { name: "速", speed: 1.3, radius: 12, hp: 80, atk: 12, interval: 40, cost: 15, range: 0.35 },
    { name: "重", speed: 0.35, radius: 25, hp: 450, atk: 45, interval: 80, cost: 70, range: 0.25 },
    { name: "乱", speed: 1.0, radius: 10, hp: 45, atk: 8, interval: 45, cost: 12, range: 0.4, jitter: true },
    { name: "砲", speed: 0.1, radius: 20, hp: 160, atk: 85, interval: 170, cost: 85, range: 0.15, isCannon: true },
    { name: "突", speed: 2.6, radius: 12, hp: 60, atk: 25, interval: 35, cost: 35, range: 0.5 },
    { name: "盾", speed: 0.25, radius: 28, hp: 1000, atk: 5, interval: 100, cost: 75, range: 0.2 },
    { name: "爆", speed: 1.9, radius: 13, hp: 35, atk: 500, interval: 1, cost: 55, range: 0.45, isBomb: true },
    { name: "氷", speed: 0.7, radius: 16, hp: 130, atk: 7, interval: 70, cost: 40, range: 0.35 },
    { name: "雷", speed: 0.6, radius: 15, hp: 110, atk: 70, interval: 110, cost: 65, range: 0.25, isCannon: true },
    { name: "影", speed: 1.1, radius: 12, hp: 70, atk: 12, interval: 45, cost: 30, range: 0.4 }
];

let myRole = 'guest';
let myDeckIndices = [];
let gameRunning = false;
let myMp = 40;
let mpRegen = 0.15;
let selectedSlot = 0;
let units = [], obstacles = [];
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');

// --- 通信ロジック ---

socket.on('init-player', (data) => {
    myRole = data.role;
    document.getElementById('role-badge').innerText = myRole.toUpperCase() + " PLAYER";
    if (myRole === 'host') {
        document.getElementById('host-config').style.display = 'block';
    } else {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('guest-msg').style.display = 'block';
    }
});

socket.on('update-room', (data) => {
    document.getElementById('room-status').innerText = `参加者: ${data.count}/2` + (data.count === 2 ? " (準備完了)" : " (待機中)");
    updateStartButton(data.count);
});

socket.on('config-changed', (config) => {
    mpRegen = parseFloat(config.mpSpeed);
});

socket.on('game-start-signal', () => {
    runGame();
});

socket.on('enemy-spawn', (data) => {
    const type = data.unit;
    units.push(new Unit(canvas.width - data.x, data.y, 'enemy', type));
});

function updateConfig() {
    if (myRole !== 'host') return;
    socket.emit('update-config', { mpSpeed: document.getElementById('mp-speed').value });
}

function updateStartButton(count) {
    const btn = document.getElementById('start-btn');
    if (myRole === 'host' && count === 2 && myDeckIndices.length === 5) {
        btn.classList.add('ready');
        btn.disabled = false;
    } else {
        btn.classList.remove('ready');
        btn.disabled = true;
    }
}

function requestStart() {
    socket.emit('request-start');
}

// --- ゲームロジック ---

// デッキ作成UI
ALL_UNITS.forEach((u, i) => {
    const card = document.createElement('div'); card.className = 'unit-card';
    card.innerHTML = `<span class="cost">${u.cost}</span><span style="font-size:20px">${EMOJI[u.name]}</span><b>${u.name}</b>`;
    card.onclick = () => {
        if (myDeckIndices.includes(i)) myDeckIndices.splice(myDeckIndices.indexOf(i),1);
        else if (myDeckIndices.length < 5) myDeckIndices.push(i);
        card.classList.toggle('selected', myDeckIndices.includes(i));
        updateStartButton(2); // 自分の準備確認
    };
    document.getElementById('grid-p1').appendChild(card);
});

function runGame() {
    gameRunning = true;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    canvas.style.display = 'block';
    
    // バトルスロット生成
    const slotContainer = document.getElementById('battle-slots');
    myDeckIndices.forEach((idx, i) => {
        const u = ALL_UNITS[idx];
        const slot = document.createElement('div');
        slot.className = `slot ${i===0?'active':''}`;
        slot.innerHTML = EMOJI[u.name] + `<span style="font-size:10px; position:absolute; bottom:0; right:2px;">${u.cost}</span>`;
        slot.onclick = () => {
            selectedSlot = i;
            Array.from(slotContainer.children).forEach((s, j) => s.classList.toggle('active', i === j));
        };
        slotContainer.appendChild(slot);
    });

    resize();
    loop();
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    obstacles = [{x: canvas.width/2, y: canvas.height/2, r: 40, hp: 1000, active: true}];
}

class Unit {
    constructor(x, y, side, type) {
        this.x = x; this.y = y; this.side = side; this.type = type;
        this.hp = type.hp; this.maxHp = type.hp; this.active = true;
        this.vx = (side === 'me') ? -type.speed : type.speed;
    }
    update() {
        let blocked = false;
        obstacles.forEach(o => { if(o.active && Math.hypot(this.x-o.x, this.y-o.y) < this.type.radius + o.r) blocked = true; });
        if(!blocked) this.x += this.vx;
        if(this.x < 0 || this.x > canvas.width) this.active = false;
    }
    draw() {
        ctx.font = `${this.type.radius*2.5}px serif`;
        ctx.textAlign = "center";
        ctx.fillText(EMOJI[this.type.name], this.x, this.y);
    }
}

function loop() {
    if(!gameRunning) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    myMp = Math.min(100, myMp + mpRegen);
    document.getElementById('mp-fill').style.height = myMp + '%';

    obstacles.forEach(o => { if(o.active) { ctx.font="40px serif"; ctx.fillText(EMOJI.obs, o.x, o.y); } });
    units.forEach(u => { u.update(); u.draw(); });
    units = units.filter(u => u.active);

    requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', e => {
    if(!gameRunning) return;
    const unitType = ALL_UNITS[myDeckIndices[selectedSlot]];
    // 右半分が自分の召喚エリア
    if(myMp >= unitType.cost && e.clientX > canvas.width/2) {
        myMp -= unitType.cost;
        units.push(new Unit(e.clientX, e.clientY, 'me', unitType));
        socket.emit('spawn', { x: e.clientX, y: e.clientY, unit: unitType });
    }
});

</script>
</body>
</html>
