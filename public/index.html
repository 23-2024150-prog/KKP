<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Tactics Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 元のCSSを統合 */
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #1b3d17; font-family: sans-serif; }
        canvas { display: none; width: 100vw; height: 100vh; background: #1b3d17; }
        #online-overlay { position: fixed; inset: 0; background: #fdfdfd; z-index: 200; display: flex; align-items: center; justify-content: center; }
        .menu-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        #setup-screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #fdfdfd; z-index: 50; }
        .unit-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; max-width: 180px; }
        .unit-card { height: 60px; border: 2px solid #ddd; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; cursor: pointer; }
        .selected { border-color: #ff9f43 !important; background: #fffbf0; }
        /* ゲーム中UI */
        #ui { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 30; }
        .side-bar { position: absolute; top: 0; bottom: 0; width: 90px; display: flex; align-items: center; pointer-events: auto; }
        .p2-bar { left: 5px; } .p1-bar { right: 5px; flex-direction: row-reverse; }
        .slot { width: 65px; height: 55px; background: rgba(255,255,255,0.9); border: 2px solid #ccc; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 5px 0; }
        .slot.active { border-color: #333; transform: scale(1.1); }
        .mp-bar { width: 12px; height: 280px; background: rgba(0,0,0,0.5); margin: 0 10px; overflow: hidden; }
        .mp-fill { width: 100%; transition: height 0.1s; position: absolute; bottom: 0; }
        #result-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
    </style>
</head>
<body>

<div id="online-overlay">
    <div class="menu-card">
        <h2>Emoji Tactics Online</h2>
        <input type="number" id="cfg-hp" value="2000" placeholder="Base HP">
        <input type="number" id="cfg-mp" value="40" placeholder="Start MP"><br><br>
        <button onclick="createRoom()" style="background:#e67e22; color:white; padding:10px 20px; border:none; border-radius:20px;">ルームを作る</button>
        <hr style="margin:20px 0;">
        <input type="text" id="join-id" placeholder="ルームコード"><br><br>
        <button onclick="joinRoom()" style="background:#2e86de; color:white; padding:10px 20px; border:none; border-radius:20px;">参加する</button>
        <p id="status-msg" style="font-size:12px; color:red; margin-top:10px;"></p>
    </div>
</div>

<div id="setup-screen">
    <div style="padding:10px; text-align:center; background:#333; color:white;">ONLINE MATCHING</div>
    <div style="display:flex; flex:1;">
        <div class="player-side" style="flex:1; padding:10px; background:#fff1f1;"><h3>RED (ENEMY)</h3><div class="unit-grid" id="grid2"></div></div>
        <div class="player-side" style="flex:1; padding:10px; background:#f1f7ff;"><h3>BLUE (YOU)</h3><div class="unit-grid" id="grid1"></div></div>
    </div>
    <div style="height:80px; display:flex; justify-content:center; align-items:center; border-top:1px solid #ddd;">
        <button id="start-btn" onclick="sendReady()" style="padding:10px 40px; border-radius:20px; background:#ccc; border:none;">準備完了</button>
    </div>
</div>

<div id="ui">
    <div id="base-hp" style="position:absolute; top:15px; width:100%; display:flex; justify-content:center; gap:20px;">
        <div style="width:30%; height:10px; background:#444;"><div id="hp2-fill" style="width:100%; height:100%; background:#ff4757;"></div></div>
        <div style="width:30%; height:10px; background:#444;"><div id="hp1-fill" style="width:100%; height:100%; background:#2e86de;"></div></div>
    </div>
    <div class="side-bar p2-bar"><div id="slots2"></div><div class="mp-bar"><div id="mp2-fill" class="mp-fill" style="background:#ff4757;"></div></div></div>
    <div class="side-bar p1-bar"><div id="slots1"></div><div class="mp-bar"><div id="mp1-fill" class="mp-fill" style="background:#2e86de;"></div></div></div>
</div>

<div id="result-screen"><h1 id="result-title"></h1><button onclick="location.reload()">戻る</button></div>
<canvas id="gameCanvas"></canvas>

<script>
const socket = io();
let curRoomId = null, myRole = null, opponentReady = false;

// --- 通信処理 ---
function createRoom() {
    socket.emit('createRoom', { hp: document.getElementById('cfg-hp').value, mp: document.getElementById('cfg-mp').value });
}
function joinRoom() {
    socket.emit('joinRoom', document.getElementById('join-id').value.toUpperCase());
}
socket.on('roomCreated', id => {
    curRoomId = id; myRole = 1;
    document.getElementById('status-msg').innerText = "コード: " + id + " (待機中...)";
});
socket.on('initGame', data => {
    myRole = (myRole === 1) ? 1 : 2;
    players[1].hp = players[2].hp = parseInt(data.settings.hp);
    players[1].mp = players[2].mp = parseInt(data.settings.mp);
    document.getElementById('online-overlay').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
});

function sendReady() {
    const deck = (myRole === 1) ? p1Deck : p2Deck;
    if(deck.length === 5) {
        socket.emit('gameAction', { roomId: curRoomId, type: 'ready', role: myRole, deck: deck });
        document.getElementById('start-btn').innerText = "相手を待っています...";
        checkStart();
    }
}
socket.on('remoteAction', data => {
    if(data.type === 'ready') {
        opponentReady = true;
        if(data.role === 1) p1Deck = data.deck; else p2Deck = data.deck;
        checkStart();
    } else if(data.type === 'spawn') {
        units.push(new Unit(canvas.width - data.x, data.y, data.role, ALL_UNITS[data.uIdx]));
        players[data.role].mp -= ALL_UNITS[data.uIdx].cost;
    }
});
function checkStart() {
    const myDeck = (myRole === 1) ? p1Deck : p2Deck;
    if(opponentReady && myDeck.length === 5) startGame();
}

// --- ゲームロジック (基本ロジックは変えず、同期処理のみ追加) ---
const EMOJI = { "速":"🏃", "重":"🐘", "乱":"🐝", "砲":"💣", "突":"🏎️", "盾":"🛡️", "爆":"🧨", "氷":"❄️", "雷":"⚡", "影":"👻", "obs":"🪨" };
const ALL_UNITS = [
    { name: "速", speed: 1.3, radius: 12, hp: 80, atk: 12, interval: 40, cost: 15, range: 0.35 },
    { name: "重", speed: 0.35, radius: 25, hp: 450, atk: 45, interval: 80, cost: 70, range: 0.25 },
    { name: "乱", speed: 1.0, radius: 10, hp: 45, atk: 8, interval: 45, cost: 12, range: 0.4, jitter: true },
    { name: "砲", speed: 0.1, radius: 20, hp: 160, atk: 85, interval: 170, cost: 85, range: 0.15, isCannon: true },
    { name: "突", speed: 2.6, radius: 12, hp: 60, atk: 25, interval: 35, cost: 35, range: 0.5 },
    { name: "盾", speed: 0.25, radius: 28, hp: 1000, atk: 5, interval: 100, cost: 75, range: 0.2 },
    { name: "爆", speed: 1.9, radius: 13, hp: 35, atk: 500, interval: 1, cost: 55, range: 0.45, isBomb: true },
    { name: "氷", speed: 0.7, radius: 16, hp: 130, atk: 7, interval: 70, cost: 40, range: 0.35 },
    { name: "雷", speed: 0.6, radius: 15, hp: 110, atk: 70, interval: 110, cost: 65, range: 0.25, isCannon: true },
    { name: "影", speed: 1.1, radius: 12, hp: 70, atk: 12, interval: 45, cost: 30, range: 0.4 }
];

let p1Deck = [], p2Deck = [], gameRunning = false, units = [], bullets = [], effects = [], obstacles = [];
const players = { 1: { hp: 2000, mp: 40, selected: 0, deck: [] }, 2: { hp: 2000, mp: 40, selected: 0, deck: [] } };
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');

// デッキ選択UI生成
[1, 2].forEach(pID => {
    const grid = document.getElementById('grid' + pID);
    ALL_UNITS.forEach((u, i) => {
        const card = document.createElement('div'); card.className = 'unit-card';
        card.innerHTML = `<span style="font-size:20px">${EMOJI[u.name]}</span><br>${u.name}(${u.cost})`;
        card.onclick = () => {
            if(pID !== myRole) return;
            const deck = (pID === 1) ? p1Deck : p2Deck;
            if(deck.includes(i)) deck.splice(deck.indexOf(i),1); else if(deck.length < 5) deck.push(i);
            card.classList.toggle('selected', deck.includes(i));
            document.getElementById('start-btn').style.background = (deck.length===5) ? "#ff9f43" : "#ccc";
        };
        grid.appendChild(card);
    });
});

// バトル開始
function startGame() {
    gameRunning = true; document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block'; canvas.style.display = 'block';
    players[1].deck = p1Deck.map(i => ALL_UNITS[i]); players[2].deck = p2Deck.map(i => ALL_UNITS[i]);
    resize(); initBattleUI(); loop();
}

// 召喚
canvas.addEventListener('mousedown', e => {
    if(!gameRunning) return;
    const myData = players[myRole];
    const uIdx = (myRole === 1) ? p1Deck[myData.selected] : p2Deck[myData.selected];
    const unitType = ALL_UNITS[uIdx];
    // 右半分が召喚エリア
    if(e.clientX > canvas.width * 0.6 && myData.mp >= unitType.cost) {
        units.push(new Unit(e.clientX, e.clientY, myRole, unitType));
        myData.mp -= unitType.cost;
        socket.emit('gameAction', { roomId: curRoomId, type: 'spawn', role: myRole, uIdx: uIdx, x: e.clientX, y: e.clientY });
    }
});

// --- 以下、既存の Unit クラス / loop ロジック ---
// ※コードが非常に長くなるため、前回の Unit クラス定義と loop 内の描画・更新処理をここに統合してください。
// CPU思考部分（isCPUMode）のみ削除し、他はそのまま利用可能です。
// ※座標同期のため、Unitクラス内での移動方向は owner によって切り替えてください。

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
}
function initBattleUI() {
    [1, 2].forEach(id => {
        const container = document.getElementById('slots' + id); container.innerHTML = '';
        players[id].deck.forEach((u, i) => {
            const slot = document.createElement('div'); slot.className = `slot ${i===players[id].selected?'active':''}`;
            slot.innerHTML = EMOJI[u.name];
            if(id === myRole) slot.onclick = () => { 
                players[id].selected = i; 
                Array.from(container.children).forEach((s, idx) => s.classList.toggle('active', idx === i));
            };
            container.appendChild(slot);
        });
    });
}
// ... 描画ループやUnitクラスの詳細は前回コードをそのまま適用 ...
</script>
</body>
</html>
